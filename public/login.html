<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Lynx Startups - Login</title>
</head>
<body>
    <div class="login-box">
        <h1>LYNIX STARTUPS</h1>
        <p class="subtitle">INICIA SESIÓN</p>
        <div id="loginForm">
            <label for="email">Correo empresarial</label>
            <input type="email" id="email" placeholder="tucorreo@lynx.com" required>

            <label for="password">Contraseña</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
            </div>

            <p id="errorMsg" class="error-msg"></p>
            <button class="btn-ingresar" onclick="handleLogin()">Ingresar</button>

            <!-- Divisor igual al del profe -->
            <div class="divider"><span>o</span></div>

            <!-- Botón Google con SVG igual al del profe -->
            <a href="/auth/google" class="btn-google">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar con Google
            </a>
        </div>
    </div>

    <script src="js/services/api.js"></script>
    <script src="js/ui/loginUI.js"></script>
    <script src="js/login.js"></script>
    <script>
        // Mostrar error si Google falló (igual que el profe)
        const params = new URLSearchParams(window.location.search);
        if (params.get("error") === "auth_failed") {
            document.getElementById("errorMsg").textContent = "Error al autenticar con Google. Intenta de nuevo.";
        }
    </script>
</body>
</html>
